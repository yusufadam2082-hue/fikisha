services:
  - type: web
    name: fikisha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MERCHANT_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: file:/var/data/fikisha.db
    disk:
      name: fikisha-data
      mountPath: /var/data
      sizeGB: 1