services:
  - type: web
    name: mtaaexpress-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run prisma:prepush:sanitize && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /health
    disks:
      - name: mtaaexpress-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MERCHANT_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_LEGACY_PAYOUT_LEDGER_FALLBACK
        value: "false"
      - key: ALLOW_DEMO_SEED
        value: "false"
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MPESA_ENVIRONMENT
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_RECONCILIATION_INTERVAL_MS
        sync: false